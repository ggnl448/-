<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ Предавью заблюрено</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #1f1f2e, #0b0b14);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            overflow: hidden; /* чтобы лишние полосы не вылезали при полёте */
        }

        /* ----- ОСНОВНОЙ БЕЗОБИДНЫЙ КОНТЕЙНЕР (ЗАМАЗАННОЕ ФОТО) ----- */
        .blur-card {
            max-width: 600px;
            background: rgba(24, 24, 36, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px;
            box-shadow: 0 30px 40px -10px black, 0 0 0 2px rgba(255, 215, 0, 0.6), 0 0 30px rgba(255, 200, 50, 0.3);
            border: 1px solid gold;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .warning-label {
            color: #ffd966;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: #00000060;
            display: inline-block;
            padding: 0.4rem 1.8rem;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid orange;
            font-weight: 500;
        }

        /* замазанное изображение — СТАНДАРТНЫЙ РАЗМЕР (не увеличивал) */
        .blur-wrapper {
            border-radius: 36px;
            overflow: hidden;
            border: 3px solid #ffd966;
            background: black;
            aspect-ratio: 1/1;
            cursor: pointer;
            transition: 0.2s;
            filter: blur(18px) brightness(0.8);
            box-shadow: 0 0 50px rgba(255, 200, 0, 0.2);
        }

        .blur-wrapper:hover {
            filter: blur(14px) brightness(0.9);
            transform: scale(1.01);
            box-shadow: 0 0 70px gold;
        }

        .blur-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .cta-text {
            margin-top: 24px;
            font-size: 1.4rem;
            color: #e0d6b0;
            background: #00000060;
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px dashed #ffdb7c;
            font-weight: 600;
        }

        .cta-text span {
            background: #ffecaa;
            color: #1a142b;
            padding: 5px 16px;
            border-radius: 40px;
            margin-left: 12px;
            font-size: 1rem;
        }

        /* ----- ЛЕТАЮЩИЙ СКРИМЕР (8 картинок + текст) ----- */
        .screamer-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000e0;
            backdrop-filter: blur(2px);
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.1s, visibility 0s 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .screamer-container.show {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.1s, visibility 0s 0s;
            pointer-events: auto;
        }

        /* контейнер для восьми бешено летающих картинок */
        .flying-images {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* УВЕЛИЧЕННЫЙ стиль для каждой летающей картинки (ТОЛЬКО ЗДЕСЬ) */
        .flyer {
            position: absolute;
            width: min(840px, 32vw);   /* было 160px -> теперь 280px (гораздо крупнее) */
            aspect-ratio: 1/1;
            border-radius: 40px;        /* чуть больше скругление */
            border: 6px solid red;       /* толще рамка */
            box-shadow: 0 0 100px #ff6600, 0 0 50px yellow;
            object-fit: cover;
            opacity: 0.95;
            filter: contrast(1.4) saturate(1.8);
            animation: flyAround 4.2s infinite alternate ease-in-out;
            will-change: transform, left, top;
        }

        /* разная длительность и задержки, чтобы хаотичнее */
        .flyer:nth-child(odd) {
            animation-duration: 3.8s;
            animation-timing-function: cubic-bezier(0.45, 0.9, 0.55, 1.1);
        }
        .flyer:nth-child(3n) {
            animation-duration: 5.5s;
            filter: hue-rotate(10deg) brightness(1.3);
        }
        .flyer:nth-child(5n+2) {
            animation-duration: 4.9s;
            animation-delay: -1.2s;
        }

        /* ключевые кадры для безумных перемещений по всему экрану */
        @keyframes flyAround {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            20% { transform: translate(15vw, 25vh) rotate(120deg) scale(1.1); }
            40% { transform: translate(60vw, -5vh) rotate(240deg) scale(0.9); }
            60% { transform: translate(10vw, 70vh) rotate(360deg) scale(1.2); }
            80% { transform: translate(75vw, 40vh) rotate(480deg) scale(0.8); }
            100% { transform: translate(30vw, 10vh) rotate(600deg) scale(1.1); }
        }

        /* центральный текст ВАШ ТЕЛЕФОН ВЗЛОМАН */
        .hacked-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 12vw, 5.5rem);
            font-weight: 900;
            color: #00ff00;
            text-shadow: 0 0 20px red, 0 0 60px #ff0000, 4px 4px 0 black, 8px 8px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 0.2em 1.2em;
            border-radius: 80px;
            white-space: nowrap;
            border: 6px solid #ff0000;
            box-shadow: 0 0 100px red;
            z-index: 10000;
            letter-spacing: 6px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            animation: glitch 0.2s infinite alternate;
            pointer-events: none;
        }

        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(0deg, 0deg); opacity: 1; }
            30% { transform: translate(calc(-50% + 3px), calc(-50% - 2px)) skew(5deg); text-shadow: -6px 0 red, 6px 0 blue; }
            70% { transform: translate(calc(-50% - 3px), calc(-50% + 2px)) skew(-5deg); text-shadow: 6px 0 red, -6px 0 blue; }
            100% { transform: translate(-50%, -50%) skew(0deg); }
        }

        /* маленькая кнопка аварийного выхода */
        .scream-exit {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #222;
            color: white;
            border: 2px solid #aaa;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20000;
            opacity: 0.4;
            transition: 0.2s;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }

        .scream-exit:hover {
            opacity: 1;
            background: darkred;
            border-color: white;
        }

        .disclaimer-small {
            position: fixed;
            bottom: 8px;
            left: 12px;
            color: #777;
            font-size: 0.7rem;
            background: #00000090;
            padding: 4px 16px;
            border-radius: 30px;
            z-index: 20001;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ЗАМАЗАННАЯ КАРТОЧКА (приманка) — СТАНДАРТНЫЙ РАЗМЕР -->
    <div class="blur-card">
        <div class="warning-label">🔞 18+ тебе нельзя малыш</div>
        <div class="blur-wrapper" id="clickTrigger">
            <!-- то самое изображение, но оно сейчас под сильным размытием -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDpjC-JXogbnor0MEe2Xvh4qgWSupvbcSQfMe4tgoRGHnGUA2xPWfi9yjTj9QDXP8u12oF15qdi82BRh6o1k1xV7X_SuZgd0_pNbx0AQ&s=10" 
                 alt="censored" 
                 crossorigin="anonymous"
                 loading="eager">
        </div>
        <div class="cta-text">
            👁️ нажми чтобы увидеть правду <span>8K HDR</span>
        </div>
    </div>

    <!-- КОНТЕЙНЕР СКРИМЕРА (8 летающих картинок + текст) -->
    <div class="screamer-container" id="screamerArea">
        <div class="flying-images" id="flyingImagesContainer">
            <!-- 8 картинок будут вставлены через JS, используя ту же ссылку -->
        </div>
        <!-- текст поверх всего -->
        <div class="hacked-message">⚠️ ВАШ ТЕЛЕФОН ВЗЛОМАН ⚠️</div>
        <button class="scream-exit" id="killScreamer">✖ ВЫКЛЮЧИТЬ КОШМАР</button>
    </div>

    <div class="disclaimer-small">⚠️ после клика 8 огромных изображений летают + угроза</div>

    <script>
        (function() {
            const trigger = document.getElementById('clickTrigger');
            const screamerDiv = document.getElementById('screamerArea');
            const exitBtn = document.getElementById('killScreamer');
            const flyingContainer = document.getElementById('flyingImagesContainer');

            // ссылка на изображение (та же самая)
            const imageUrl = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDpjC-JXogbnor0MEe2Xvh4qgWSupvbcSQfMe4tgoRGHnGUA2xPWfi9yjTj9QDXP8u12oF15qdi82BRh6o1k1xV7X_SuZgd0_pNbx0AQ&s=10";

            // функция создания восьми летающих изображений (если их ещё нет)
            function spawnFlyingImages() {
                // очищаем контейнер (чтобы при повторном вызове не дублировались)
                flyingContainer.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.alt = 'scare';
                    img.className = 'flyer';
                    img.crossOrigin = 'anonymous';
                    // небольшие случайные смещения для начальной позиции (разброс)
                    img.style.left = Math.random() * 60 + '%';
                    img.style.top = Math.random() * 60 + '%';
                    // немного рандомизируем анимацию через data-атрибут (дополнительно)
                    const randomDelay = (Math.random() * 2).toFixed(2) + 's';
                    img.style.animationDelay = randomDelay;
                    flyingContainer.appendChild(img);
                }
            }

            // клик по замазанному изображению — запуск скримера
            trigger.addEventListener('click', function(e) {
                e.stopPropagation();

                // создаём 8 картинок (если контейнер пуст или обновляем)
                spawnFlyingImages();

                // показываем скример
                screamerDiv.classList.add('show');

                // вибро если есть
                try { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate([300, 100, 300]); } catch (e) {}

                // меняем заголовок
                document.title = '⚠️ ВЗЛОМ ⚠️';
            });

            // выход из скримера по кнопке
            function exitScreamer() {
                screamerDiv.classList.remove('show');
                document.title = '⚠️ Предавью заблюрено';
                try { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(0); } catch (e) {}
            }

            exitBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                exitScreamer();
            });

            // закрытие по ESC
            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && screamerDiv.classList.contains('show')) {
                    exitScreamer();
                }
            });

            // клик по самому скримеру (фону) не закрывает — только кнопка или ESC.
            // дополнительно запрещаем контекстное меню в скримере
            screamerDiv.addEventListener('contextmenu', (e) => e.preventDefault());

            // предзагружаем картинку в кеш (она уже есть в размытом блоке, так что ок)
        })();
    </script>
</body>
            </html>
