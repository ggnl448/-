<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Внимание 📸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 40%, #1b1b2f, #0a0a10);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        /* основной "безопасный" контейнер — простая карточка с изображением */
        .gallery-card {
            max-width: 620px;
            width: 100%;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 42px;
            padding: 24px 24px 32px 24px;
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.8), 0 0 0 2px #fffa9e inset, 0 0 15px #ffd966;
            border: 1px solid rgba(255, 245, 170, 0.6);
            transition: box-shadow 0.2s;
        }
        .preview-text {
            text-align: center;
            color: #fff3c9;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            font-size: 1.1rem;
            text-shadow: 0 0 6px gold;
            margin-bottom: 18px;
        }
        /* изображение — именно та ссылка, которую дал пользователь */
        .image-wrapper {
            border-radius: 28px;
            overflow: hidden;
            border: 3px solid #f7e05e;
            box-shadow: 0 0 30px #f5cb42;
            background: #000;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.3s;
        }
        .image-wrapper:hover {
            transform: scale(1.01);
            filter: brightness(1.1);
            box-shadow: 0 0 40px #ffdb7c;
        }
        .image-wrapper:active {
            transform: scale(0.99);
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;  /* чтобы клик ловился именно на обёртке */
        }
        .hint {
            color: #cdc6a5;
            text-align: center;
            margin-top: 22px;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.4);
            padding: 8px 18px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            border: 1px dashed #ffd966;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .hint span {
            display: inline-block;
            background: #ffecaa;
            color: #1e1a2b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-left: 8px;
            font-weight: bold;
        }

        /* ---- СКРИМЕР (изначально скрыт) ---- */
        .screamer-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;      /* невидим и не реагирует на мышь */
            opacity: 0;
            transition: opacity 0.25s cubic-bezier(0, 1, 0, 1), visibility 0s 0.3s;
            /* фон для букв */
            background-image: repeating-linear-gradient(45deg, #1a0000 0px, #1a0000 4px, #2b0000 4px, #2b0000 8px);
            box-shadow: 0 0 50px red inset;
            pointer-events: none;
        }
        /* активируем скример — через класс .show на оверлее */
        .screamer-overlay.show {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.08s linear, visibility 0s 0s;
            pointer-events: auto;      /* перехватываем клики чтобы нельзя было закрыть тыком */
        }

        /* контент скримера: ОЧЕНЬ громко и внезапно */
        .screamer-content {
            text-align: center;
            animation: insane-pulse 0.08s infinite alternate;
        }

        /* то же самое изображение, но теперь оно играет роль пугалки + большой размер */
        .screamer-img {
            width: min(90vw, 800px);
            border-radius: 40px;
            border: 8px solid #ff0000;
            box-shadow: 0 0 120px #ff6600, 0 0 40px 10px #ffbb00;
            filter: contrast(1.4) brightness(1.3) saturate(2.5);
            transform: rotate(1deg) scale(1.02);
            animation: shake 0.08s infinite;
        }

        .scary-text {
            font-size: 6rem;
            font-weight: 900;
            color: #ffff00;
            text-shadow: 6px 6px 0 #ff0000, 12px 12px 0 #000, 0 0 30px white;
            margin-top: 20px;
            letter-spacing: 16px;
            text-transform: uppercase;
            animation: textflick 0.1s infinite;
            background: rgba(0,0,0,0.5);
            padding: 10px 0;
            backdrop-filter: blur(2px);
        }
        .sub-scare {
            font-size: 2.4rem;
            color: white;
            background: red;
            display: inline-block;
            padding: 0.2em 1.4em;
            border-radius: 60px;
            font-weight: 800;
            margin-top: 20px;
            box-shadow: 0 0 40px orange;
            transform: skew(-5deg) scale(1.1);
            border: 3px solid yellow;
        }

        /* жуткие анимации */
        @keyframes insane-pulse {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            100% { transform: scale(1.02) rotate(0.5deg); filter: hue-rotate(15deg) brightness(1.6); }
        }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-4px, 0px) rotate(2deg); }
            40% { transform: translate(4px, -2px) rotate(-2deg); }
            60% { transform: translate(-2px, 3px) rotate(0deg); }
            80% { transform: translate(3px, -3px) rotate(2deg); }
            100% { transform: translate(-2px, 2px) rotate(-2deg); }
        }
        @keyframes textflick {
            0% { opacity: 1; text-shadow: 6px 6px 0 red, 0 0 30px yellow; }
            25% { opacity: 0.9; text-shadow: -6px -6px 0 red, 0 0 60px white; }
            50% { opacity: 1; text-shadow: 6px -6px 0 #ff3300, 0 0 50px orange; }
            75% { opacity: 0.95; text-shadow: -6px 6px 0 darkred, 0 0 40px red; }
            100% { opacity: 1; transform: scale(1.01); }
        }

        /* кнопка возврата (маленькая, но есть — вдруг реально напугается человек) */
        .emergency-exit {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            background: black;
            color: white;
            border: 2px solid gray;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0.2;
            transition: 0.2s;
            text-decoration: none;
            font-weight: bold;
            background: #222;
            pointer-events: auto;
        }
        .emergency-exit:hover {
            opacity: 1;
            background: darkred;
            border-color: white;
        }

        /* пояснение для честности (мелкое) */
        .disclaimer {
            position: fixed;
            bottom: 8px;
            left: 10px;
            color: #5f5b70;
            font-size: 0.7rem;
            background: #00000055;
            padding: 2px 12px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            z-index: 99999;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- НОРМАЛЬНАЯ СТРАНИЦА: карточка с изображением (приманка) -->
    <div class="gallery-card">
        <div class="preview-text">📸 эксклюзивный кадр • нажми на фото</div>
        <div class="image-wrapper" id="triggerImage">
            <!-- именно то изображение из ссылки (пользовательское) -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDpjC-JXogbnor0MEe2Xvh4qgWSupvbcSQfMe4tgoRGHnGUA2xPWfi9yjTj9QDXP8u12oF15qdi82BRh6o1k1xV7X_SuZgd0_pNbx0AQ&s=10" 
                 alt="Preview" 
                 loading="eager"
                 crossorigin="anonymous">
        </div>
        <div class="hint">
            🔥 щёлкни по картинке — будет сюрприз <span>HTTPS скример</span>
        </div>
    </div>

    <!-- СКРИМЕР (изначально спрятан) -->
    <div class="screamer-overlay" id="screamerBlock">
        <div class="screamer-content">
            <!-- используем ТО ЖЕ САМОЕ изображение, только теперь оно часть скримера (источник тот же) -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDpjC-JXogbnor0MEe2Xvh4qgWSupvbcSQfMe4tgoRGHnGUA2xPWfi9yjTj9QDXP8u12oF15qdi82BRh6o1k1xV7X_SuZgd0_pNbx0AQ&s=10" 
                 alt="BOO!" 
                 class="screamer-img"
                 crossorigin="anonymous">
            <div class="scary-text">СЮРПРИЗ</div>
            <div class="sub-scare">⚠️ HTTPS Вторжение ⚠️</div>
        </div>
        <!-- крошечная кнопка аварийного выхода, чтобы можно было закрыть (она поверх) -->
        <button class="emergency-exit" id="exitScreamer">✖ выключить ужас</button>
    </div>

    <!-- мелкий дисклеймер (для этики) -->
    <div class="disclaimer">⚠️ скример (pu惊吓) — нажми на фото выше</div>

    <script>
        (function() {
            const trigger = document.getElementById('triggerImage');
            const screamer = document.getElementById('screamerBlock');
            const exitBtn = document.getElementById('exitScreamer');

            // функция ПОКАЗА скримера (срабатывает при клике на фото)
            function launchScreamer() {
                // добавить класс show — он делает видимым и перехватывает клики
                screamer.classList.add('show');
                // дополнительно: мелкая вибрация (если поддерживается)
                try {
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate([200, 100, 200]); // вибро-дополнение
                    }
                } catch (e) { /* тишима */ }

                // меняем заголовок страницы для полного эффекта
                document.title = '❗❗ BOO ❗❗';
            }

            // обработчик клика на обёртке с картинкой
            trigger.addEventListener('click', function(e) {
                e.stopPropagation();   // на всякий случай
                launchScreamer();
            });

            // функция выхода из скримера
            function exitScreamerMode() {
                screamer.classList.remove('show');
                document.title = 'Внимание 📸';  // возвращаем исходный заголовок
                // сбрасываем вибрацию (не обязательно)
                try {
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(0);
                    }
                } catch (e) {}
            }

            // клик по кнопке "выключить ужас" — выход
            exitBtn.addEventListener('click', function(e) {
                e.stopPropagation();  // чтобы не пробрасывалось на оверлей
                exitScreamerMode();
            });

            // ЩИТ: если вдруг пользователь кликнет куда-то по оверлею (не по кнопке),
            // ничего не произойдёт — он не закроется случайно (пугающий эффект сохраняется)
            // Но дадим возможность закрыть по ESC (для удобства)
            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && screamer.classList.contains('show')) {
                    exitScreamerMode();
                }
            });

            // дополнительная защита от случайного закрытия при клике на сам контент скримера
            // Но мы не запрещаем клик на картинку, но пусть остается — ничего не сломает
            // однако нажатие на крестик уже работает.

            // если пользователь кликнет мимо кнопки — скример не выключается,
            // это соответствует идее "жуткого" скримера. 
            // Но добавим еще вариант: клик по самому оверлею (фону) не глушит сигнал.
            screamer.addEventListener('click', function(e) {
                // Если клик пришёлся именно на сам оверлей (а не на дочерние элементы с остановкой всплытия)
                // ничего не делаем, остаёмся в скримере.
                // но если клик был на кнопке, она уже отработала.
            });

            // предзагрузка? изображение уже подгружено в обычной карточке, поэтому в скримере оно появится мгновенно.
            // но на всякий случай форсим кэширование через скрытый Image (но оно уже есть в DOM)
            // также на случай, если вдруг ссылка немного видоизменилась — у нас везде одна и та же ссылка.

            // Половинчатая мера: на мобильных устройствах хоумскрин не сломает.
            // Также добавим предотвращение контекстного меню на время скримера (немного жути)
            screamer.addEventListener('contextmenu', function(e) {
                if (screamer.classList.contains('show')) {
                    e.preventDefault();
                }
            });

            // изначально скример скрыт, всё готово
            console.log('HTTPS скример заряжен! кликни по картинке.');
        })();
    </script>
</body>
</html>
